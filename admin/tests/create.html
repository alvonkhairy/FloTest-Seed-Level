<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../../assets/css/style.css">
    <title>Buat Tes - Admin</title>
</head>
<body>
    <header>
        <h1>Dashboard Admin</h1>
        <a href="../dashboard.html">
            <button type="button" class="logout-btn">Dashboard</button>
        </a>
    </header>

    <main>
        <section class="form-section">
            <h2>Buat Tes Baru</h2>

            <form>
                <div class="form-group">
                    <label for="title">Title <span class="required-mark">*</span></label>
                    <input type="text" id="title" name="title" placeholder="Masukkan judul tes" required>
                </div>

                <div class="form-group">
                    <label for="mentor">Mentor <span class="required-mark">*</span></label>
                    <input type="text" id="mentor" name="mentor" placeholder="Masukkan nama mentor" required>
                </div>

                <div class="form-group">
                    <label for="status">Status <span class="required-mark">*</span></label>
                    <select id="status" name="status" required>
                        <option value="">-- Pilih Status --</option>
                        <option value="draft">Draft</option>
                        <option value="published">Published</option>
                        <option value="archived">Archived</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="question-count">Question Count <span class="required-mark">*</span></label>
                    <input type="number" id="question-count" name="question-count" placeholder="Masukkan jumlah soal" min="1" required>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn-submit">Simpan Tes</button>
                    <a href="index.html" class="btn-cancel">Batal</a>
                </div>
            </form>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 FloTest</p>
    </footer>
</body>
</html>
