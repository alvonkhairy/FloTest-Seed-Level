<!DOCTYPE html>
<html lang="id">
<head>

<body>

        <h1>Dashboard Admin</h1>

        <a href="../dashboard.html">

        <a href="create.html">

            <div>

                        <th>Jumlah Soal</th>
                        <th>Status</th>
                        <th>Aksi</th>

                <tbody>
                    <tr>
                        <td>Ujian Matematika</td>
                        <td>Matematika</td>
                        <td>60 menit</td>

                        <td class="action-buttons">
                            <a class="btn-edit" href="edit.html?test=1">Edit</a>
                            <a class="btn-delete" href="#" onclick="alert('Dummy delete')">Delete</a>

                    </tr>
                    <tr>
                        <td>Ujian Bahasa Inggris</td>

                            <a class="btn-edit" href="edit.html?test=2">Edit</a>
                            <a class="btn-delete" href="#" onclick="alert('Dummy delete')">Delete</a>
                        </td>
                    </tr>
                    <tr>
                        <td>Ujian Fisika</td>
                        <td>Fisika</td>
                        <td>50 menit</td>
                        <td>22</td>
                        <td>Tidak Aktif</td>
                        <td class="action-buttons">
                            <a class="btn-edit" href="edit.html?test=3">Edit</a>
                            <a class="btn-delete" href="#" onclick="alert('Dummy delete')">Delete</a>
                        </td>
                    </tr>

        </section>
