<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../../assets/css/style.css">
    <title>Edit Tes - Admin</title>
</head>
<body>
    <header>
        <h1>Dashboard Admin</h1>
        <a href="index.html">
            <button type="button" class="logout-btn">Daftar Tes</button>
        </a>
    </header>

    <main>
        <section class="form-section">
            <h2>Edit Tes</h2>

            <form>
                <div class="form-group">
                    <label for="test-name">Nama Tes</label>
                    <input type="text" id="test-name" name="test-name" value="Ujian Matematika" required>
                </div>

                <div class="form-group">
                    <label for="test-description">Deskripsi Tes</label>
                    <textarea id="test-description" name="test-description" rows="4" required>Ujian materi aljabar dan geometri.</textarea>
                </div>

                <div class="form-group">
                    <label for="test-subject">Mata Pelajaran</label>
                    <input type="text" id="test-subject" name="test-subject" value="Matematika" required>
                </div>

                <div class="form-group">
                    <label for="duration">Durasi (menit)</label>
                    <input type="number" id="duration" name="duration" value="60" min="1" required>
                </div>

                <div class="form-group">
                    <label for="total_questions">Jumlah Soal</label>
                    <input type="number" id="total_questions" name="total_questions" value="25" min="1" required>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn-submit">Simpan Perubahan</button>
                    <a href="index.html" class="btn-cancel">Batal</a>
                </div>
            </form>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 FloTest</p>
    </footer>
</body>
</html>
