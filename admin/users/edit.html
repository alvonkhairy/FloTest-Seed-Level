<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../../assets/css/style.css">
    <title>Edit User - Admin</title>
</head>
<body>
    <header>
        <h1>Dashboard Admin</h1>
        <a href="index.html">
            <button type="button" class="logout-btn">Daftar Users</button>
        </a>
    </header>

    <main>
        <section class="form-section">
            <h2>Edit User</h2>

            <form>
                <div class="form-group">
                    <label for="name">Nama</label>
                    <input type="text" id="name" name="name" value="Nama User" required>
                </div>

                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" value="user@example.com" required>
                </div>

                <div class="form-group">
                    <label for="role">Role</label>
                    <select id="role" name="role" required>
                        <option value="admin">Admin</option>
                        <option value="mentor">Mentor</option>
                        <option value="menti">Menti</option>
                    </select>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn-submit">Simpan Perubahan</button>
                    <a href="index.html" class="btn-cancel">Batal</a>
                </div>
            </form>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 FloTest</p>
    </footer>
</body>
</html>
