<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Take Test</title>
    <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>

<header>
    <h1>Kerjakan Tes</h1>

    <a href="dashboard.html">
        <button class="logout-btn">Kembali</button>
    </a>
</header>

<main>

<section class="menti-test">

    <p class="question-count">3 / 5</p>

    <div class="test-info">
        <h2>Nama Tes</h2>
        <p>Dasar Pemograman</p>
    </div>

    <div class="question-box">
        <h2>Pertanyaan</h2>
        <p>Manakah yang merupakan contoh tipe data bilangan bulat (integer)?</p>
    </div>

    <form>

        <label class="option">
            <input type="radio" name="answer">
            <span>A. "Halo"</span>
        </label>

        <label class="option">
            <input type="radio" name="answer">
            <span>B. 3.14</span>
        </label>

        <label class="option">
            <input type="radio" name="answer">
            <span>C. 5</span>
        </label>

        <label class="option">
            <input type="radio" name="answer">
            <span>D. 3.14</span>
        </label>

    </form>

    <nav class="test-nav">

        <a href="take-tests2.html">
            <button type="button">
                Sebelumnya
            </button>
        </a>

         <a href="take-tests4.html">
            <button type="button">
                Selanjutnya
            </button>
        </a>

        <button type="submit">
            Submit
        </button>

    </nav>

    <div class="back-nav">

        <a href="dashboard.html">
            <button type="button">
                Kembali ke Dashboard
            </button>
        </a>

    </div>

</section>

</main>

<footer>
    <p>&copy; 2026 FloTest</p>
</footer>

</body>
</html>
