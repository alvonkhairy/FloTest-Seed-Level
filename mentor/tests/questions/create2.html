<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../../../assets/css/style.css">
    <title>Buat Soal - Mentor</title>
</head>
<body>
    <header>
        <h1>Buat Soal Baru</h1>

        <a href="index2.html">
            <button type="button" class="logout-btn">Kembali ke Daftar Soal</button>
        </a>
    </header>

    <main>
        <section class="mentor-form">
            <h2>Form Buat Soal</h2>

            <form action="#" method="post">
                <div class="form-group">
                    <label for="question-text">Question Text</label>
                    <textarea id="question-text" name="question-text" rows="4" placeholder="Masukkan pertanyaan" required></textarea>
                </div>

                <div class="form-group">
                    <label for="option-a">Pilihan A</label>
                    <input type="text" id="option-a" name="option-a" placeholder="Masukkan pilihan A" required>
                </div>

                <div class="form-group">
                    <label for="option-b">Pilihan B</label>
                    <input type="text" id="option-b" name="option-b" placeholder="Masukkan pilihan B" required>
                </div>

                <div class="form-group">
                    <label for="option-c">Pilihan C</label>
                    <input type="text" id="option-c" name="option-c" placeholder="Masukkan pilihan C" required>
                </div>

                <div class="form-group">
                    <label for="option-d">Pilihan D</label>
                    <input type="text" id="option-d" name="option-d" placeholder="Masukkan pilihan D" required>
                </div>

                <div class="form-group">
                    <label for="correct-answer">Jawaban Benar</label>
                    <select id="correct-answer" name="correct-answer" required>
                        <option value="">-- Pilih Jawaban Benar --</option>
                        <option value="a">Pilihan A</option>
                        <option value="b">Pilihan B</option>
                        <option value="c">Pilihan C</option>
                        <option value="d">Pilihan D</option>
                    </select>
                </div>

                <button type="submit" class="btn-submit">Simpan Soal</button>
            </form>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 FloTest</p>
    </footer>
</body>
</html>
